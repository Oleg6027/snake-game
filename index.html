        .achievement-toast { 
            position: fixed;

        }

</head>
<body>
<div id="cloudStatus" class="cloud-status">☁️ GitHub: подключение...</div>

<div id="authModal" class="auth-modal">

    function checkAchievements(currentScore) {

            { score: 1000, id: '1000score', name: 'БОГ ЗМЕЙ', icon: '🐉' }

    // ==================== ЗВУК ====================
    function initAudio() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
    function playSound(type) {
        if (!audioCtx) initAudio();
        if (!audioCtx) return;
        let vol = (type === 'click') ? buttonsVolume / 100 : volume / 100;
        if (vol <= 0) return;
        try {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(vol * 0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
            if (type === 'eat') {
                let freq = { click:800, coin:1200, bell:1400, pop:600, ding:1000, crunch:400, powerup:1800, chime:1500, blip:700, success:2000 }[selectedEatSound] || 800;
                osc.frequency.setValueAtTime(freq, now);
                osc.start(); osc.stop(now + 0.15);
            } else if (type === 'death') { osc.frequency.setValueAtTime(300, now); osc.start(); osc.stop(now + 0.3); }
            else if (type === 'achievement') { osc.frequency.setValueAtTime(1800, now); osc.start(); osc.stop(now + 0.2); }
            else if (type === 'click') { osc.frequency.setValueAtTime(1200, now); gain.gain.setValueAtTime(vol * 0.15, now); osc.start(); osc.stop(now + 0.05); }
        } catch(e) {}
    }

    async function loadCloudData() {
        try {
            const response = await fetch(GIST_URL);
            if (response.ok) {
                const data = await response.json();
                const content = data.files?.['snake-data.json']?.content;
                if (content) cloudData = JSON.parse(content);
                updateCloudStatus('☁️ GitHub Online', true);
                return true;
            }
        } catch(e) {}
        updateCloudStatus('⚠️ Локально', false);
        return false;
    }
    
    function updateGlobalRecords() {
        const records = [];
        for (let name in cloudData.users) {
            const user = cloudData.users[name];
            if (user.highScore > 0) records.push({ name, score: user.highScore });
        }
        records.sort((a, b) => b.score - a.score);
        cloudData.globalRecords = records.slice(0, 50);
    }
    
    function saveCloudData() {
        if (!cloudConnected) return;
        updateGlobalRecords();

        if (user.password !== password) { authError.textContent = '❌ Неверный пароль'; return; }

    function registerUser(name, password) {
        if (name.length < 2) { authError.textContent = '❌ Имя должно быть не менее 2 символов'; return; }
        if (password.length < 3) { authError.textContent = '❌ Пароль должен быть не менее 3 символов'; return; }

    function getRandomFreeCell() {
        let free = [];
        for (let i=0; i<BOARD_SIZE; i++) for (let j=0; j<BOARD_SIZE; j++) 
            if (!snake.some(s=>s.x===i && s.y===j)) free.push({x:i, y:j});
        return free.length ? free[Math.floor(Math.random()*free.length)] : null;
    }
    
    function spawnNormalFood() {
        let cell = getRandomFreeCell();
        if (cell) { food = { x: cell.x, y: cell.y, type: 'normal' }; foodAnimStart = Date.now(); }
    }
    
    function activateGolden() {
        if (goldenActive && !goldenCollected) return;
        let cell = getRandomFreeCell();
        if (!cell) return;
        food = { x: cell.x, y: cell.y, type: 'golden' };
        goldenActive = true; goldenCollected = false;
        goldenSpawnTime = Date.now(); goldenEndTime = goldenSpawnTime + 5000;
        foodAnimStart = Date.now();
    }
    
    function getGoldenBonus() {
        if (!goldenActive || goldenCollected) return 0;
        let elapsed = Date.now() - goldenSpawnTime;
        if (elapsed <= 1000) return 15;
        if (elapsed <= 2000) return 13;
        if (elapsed <= 3000) return 10;
        if (elapsed <= 4000) return 7;
        return 5;
    }
    
    function handleEat(head) {
        if (!food || head.x !== food.x || head.y !== food.y) return false;
        playSound('eat');
        if (food.type === 'golden') {
            let bonus = getGoldenBonus();
            score += bonus;
            goldenCollected = true; goldenActive = false;
            if (currentUser && !currentUser.achievements.goldenFirst) { 
                currentUser.achievements.goldenFirst = true; 
                showAchievement('ЗОЛОТОЙ УЛОВ', '✨'); 
                saveCloudData(); 
            }
            normalEatenCount = 0; spawnNormalFood();
        } else {
            score += 1;
            normalEatenCount++;
            if (normalEatenCount >= 6) { normalEatenCount = 0; activateGolden(); }
            else spawnNormalFood();
        }
        checkAchievements(score);
        updateUI(); 
        return true;
    }
    
    function moveSnake() {
        if (!gameActive || isPaused) return;
        direction = nextDirection;
        let head = { ...snake[0] };
        switch(direction) {
            case 'right': head.x++; break; case 'left': head.x--; break;
            case 'up': head.y--; break; case 'down': head.y++; break;
        }
        if (head.x < 0) head.x = BOARD_SIZE-1; if (head.x >= BOARD_SIZE) head.x = 0;
        if (head.y < 0) head.y = BOARD_SIZE-1; if (head.y >= BOARD_SIZE) head.y = 0;
        for (let seg of snake) if (seg.x === head.x && seg.y === head.y) { gameOver(); return; }
        snake.unshift(head);
        if (!handleEat(head)) snake.pop();
        if (goldenActive && !goldenCollected && Date.now() >= goldenEndTime) { goldenActive = false; spawnNormalFood(); }
        eyeDirection = direction;
    }
    
    function gameOver() {
        if (!gameActive) return;
        gameActive = false; 
        if (gameInterval) { clearInterval(gameInterval); gameInterval = null; }
        playSound('death');
        if (currentUser) {
            if (!currentUser.achievements.firstDeath) {
                currentUser.achievements.firstDeath = true;
                showAchievement('ПЕРВАЯ КРОВЬ', '💀');
            }
            if (score > 0) {
                myRecords.push(score);
                myRecords.sort((a,b)=>b-a);
                myRecords = myRecords.slice(0, 10);
                currentUser.myRecords = myRecords;
                saveCloudData();
            }
        }
        deathModal.style.display = 'flex';
    }
    
    function restartGame() {
        if (gameInterval) clearInterval(gameInterval);
        snake = [{x:7, y:7}]; direction = nextDirection = 'right';
        score = 0; gameActive = true; isPaused = false;
        pauseSprite.className = 'pause-sprite pause';
        deathModal.style.display = 'none';
        updateUI();
        goldenActive = false; normalEatenCount = 0;
        spawnNormalFood();
        startGameLoop();
        draw();
    }
    
    function startGameLoop() { 
        if (gameInterval) clearInterval(gameInterval); 
        if (gameActive && !isPaused) gameInterval = setInterval(() => { moveSnake(); draw(); }, currentSpeed); 
    }
    
    function setSpeed(speed) { 
        currentSpeed = Math.max(80, Math.min(250, speed)); 
        if (gameActive && !isPaused) startGameLoop(); 
        if (currentUser) saveCloudData();
    }
    
    function togglePause() { 
        if (!gameActive) return; 
        isPaused = !isPaused; 
        pauseSprite.className = isPaused ? 'pause-sprite play' : 'pause-sprite pause'; 
        if (!isPaused) startGameLoop(); 
        else if (gameInterval) { clearInterval(gameInterval); gameInterval = null; }
        draw(); 
    }
    
    function setDirection(newDir) {
        if (!gameActive || isPaused) return;
        if ((direction==='right' && newDir==='left') || (direction==='left' && newDir==='right') ||
            (direction==='up' && newDir==='down') || (direction==='down' && newDir==='up')) return;
        nextDirection = newDir;
        playSound('click');
    }
    
    // ==================== ОТРИСОВКА ====================
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        this.moveTo(x+r, y); this.lineTo(x+w-r, y); this.quadraticCurveTo(x+w, y, x+w, y+r);
        this.lineTo(x+w, y+h-r); this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
        this.lineTo(x+r, y+h); this.quadraticCurveTo(x, y+h, x, y+h-r);
        this.lineTo(x, y+r); this.quadraticCurveTo(x, y, x+r, y);
        return this;
    };
    
    function drawGoldenApple(x, y, size) {
        let pulse = 1 + Math.sin(Date.now()*0.015)*0.08;
        ctx.shadowBlur = 20; ctx.shadowColor = "#ffaa33";
        let grad = ctx.createLinearGradient(x, y, x+size, y+size);
        grad.addColorStop(0,'#FFD700'); grad.addColorStop(0.5,'#FFC107'); grad.addColorStop(1,'#FF8C00');
        ctx.fillStyle = grad;
        ctx.save(); ctx.translate(x+size/2, y+size/2); ctx.scale(pulse, pulse); ctx.translate(-(x+size/2), -(y+size/2));
        ctx.beginPath(); ctx.arc(x+size/2, y+size/2, size*0.38, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        ctx.fillStyle = "#FFF8DC"; ctx.beginPath(); ctx.arc(x+size*0.65, y+size*0.32, size*0.08, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#7CFC00"; ctx.beginPath(); ctx.ellipse(x+size*0.75, y+size*0.22, 5, 7, -0.3, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
    
    function draw() {
        if (!ctx || !canvas) return;
        let colors = themeColors[currentTheme] || themeColors['тёмная'];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let i=0; i<BOARD_SIZE; i++) for (let j=0; j<BOARD_SIZE; j++) {
            ctx.fillStyle = (i+j)%2===0 ? colors.gridLight : colors.gridDark;
            ctx.fillRect(i*CELL_SIZE, j*CELL_SIZE, CELL_SIZE-0.5, CELL_SIZE-0.5);
            ctx.strokeStyle = colors.stroke; ctx.strokeRect(i*CELL_SIZE, j*CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }
        
        for (let i=0; i<snake.length; i++) {
            let s = snake[i];
            let grad = ctx.createLinearGradient(s.x*CELL_SIZE, s.y*CELL_SIZE, (s.x+1)*CELL_SIZE, (s.y+1)*CELL_SIZE);
            grad.addColorStop(0, colors.snake1); grad.addColorStop(1, colors.snake2);
            ctx.fillStyle = grad; ctx.shadowBlur = 6; ctx.shadowColor = "#ccffcc";
            ctx.beginPath(); ctx.roundRect(s.x*CELL_SIZE+2, s.y*CELL_SIZE+2, CELL_SIZE-4, CELL_SIZE-4, 6); ctx.fill();
            if (i===0) {
                ctx.fillStyle = "#FFF"; ctx.shadowBlur = 0;
                let ex=0, ey=0; 
                if (eyeDirection==='right') ex=4; else if (eyeDirection==='left') ex=-4;
                else if (eyeDirection==='up') ey=-4; else if (eyeDirection==='down') ey=4;
                ctx.beginPath(); 
                ctx.arc(s.x*CELL_SIZE+CELL_SIZE*0.68+ex*0.3, s.y*CELL_SIZE+CELL_SIZE*0.35+ey*0.3, 4, 0, Math.PI*2);
                ctx.arc(s.x*CELL_SIZE+CELL_SIZE*0.32+ex*0.3, s.y*CELL_SIZE+CELL_SIZE*0.35+ey*0.3, 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#000";
                ctx.beginPath(); 
                ctx.arc(s.x*CELL_SIZE+CELL_SIZE*0.68+ex*0.3, s.y*CELL_SIZE+CELL_SIZE*0.35+ey*0.3, 2, 0, Math.PI*2);
                ctx.arc(s.x*CELL_SIZE+CELL_SIZE*0.32+ex*0.3, s.y*CELL_SIZE+CELL_SIZE*0.35+ey*0.3, 2, 0, Math.PI*2); ctx.fill();
            }
        }
        ctx.shadowBlur=0;
        if (food) {
            let scale = 1; if (foodAnimStart && Date.now()-foodAnimStart<200) scale = (Date.now()-foodAnimStart)/200;
            let fx=food.x*CELL_SIZE, fy=food.y*CELL_SIZE;
            if (food.type==='golden') drawGoldenApple(fx, fy, CELL_SIZE);
            else {
                ctx.fillStyle="#ff4d4d"; ctx.shadowBlur=8;
                ctx.beginPath(); ctx.ellipse(fx+CELL_SIZE/2, fy+CELL_SIZE/2, CELL_SIZE*0.32*scale, CELL_SIZE*0.32*scale, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle="#5c9e3e"; ctx.beginPath(); ctx.ellipse(fx+CELL_SIZE*0.75, fy+CELL_SIZE*0.25, 5, 7, -0.3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle="#8B5A2B"; ctx.fillRect(fx+CELL_SIZE*0.47, fy+CELL_SIZE*0.18, 4, 10);
            }
            ctx.shadowBlur=0;
        }
        if (isPaused) {
            ctx.globalAlpha=0.7; ctx.fillStyle="#0a1f12"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha=1; ctx.font="bold 28px 'Segoe UI'"; ctx.fillStyle="#ffecb3";
            ctx.fillText("ПАУЗА", canvas.width/2-70, canvas.height/2);
        }
    }

        document.getElementById('volumeSlider').oninput = e => { volume = parseInt(e.target.value); if (currentUser) { currentUser.volume = volume; saveCloudData(); } };
        document.getElementById('buttonsVolSlider').oninput = e => { buttonsVolume = parseInt(e.target.value); if (currentUser) { currentUser.buttonsVolume = buttonsVolume; saveCloudData(); } };
        document.getElementById('eatSoundSelect').onchange = e => { selectedEatSound = e.target.value; if (currentUser) { currentUser.eatSound = selectedEatSound; saveCloudData(); } };
        document.querySelectorAll('.theme-option').forEach(opt => opt.onclick = () => { setTheme(opt.dataset.theme); renderSettings(); });
        document.getElementById('myRecordsBtn').onclick = showMyRecordsModal;
        document.getElementById('recordsBtn').onclick = showRecordsModal;
        document.getElementById('achievementsBtn').onclick = showAchievementsModal;
        document.getElementById('adminBtn').onclick = () => { settingsModal.style.display = 'none'; showPasswordModal(); };
        if (isAdmin) document.getElementById('clearAllDataBtn').onclick = () => {
            if (confirm('Удалить ВСЕХ игроков и ВСЕ рекорды?')) { cloudData = { users: {}, globalRecords: [] }; saveCloudData(); logout(); alert('Все данные очищены'); }
        };
        document.getElementById('closeSet').onclick = () => settingsModal.style.display = 'none';
    }
    
    function showPasswordModal() {
        passwordModal.style.display = 'flex';
        adminPasswordInput.value = '';
        passwordError.textContent = '';
        if (Date.now() < lockUntil) {
            passwordError.textContent = `⏳ Заблокировано на ${Math.ceil((lockUntil - Date.now())/1000)} сек`;
            document.getElementById('confirmPasswordBtn').disabled = true;
        } else document.getElementById('confirmPasswordBtn').disabled = false;
        adminPasswordInput.focus();
    }
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    function startGame() {
        gameActive = true;
        spawnNormalFood();
        startGameLoop();
        draw();
    }
    
    async function init() {
        await loadCloudData();
        const localData = localStorage.getItem('snake_cloud_data');
        if (localData && cloudData.globalRecords.length === 0) cloudData = JSON.parse(localData);
        if (!checkAutoLogin()) showAuthModal();
    }
    
    // ==================== ПРИВЯЗКА СОБЫТИЙ ====================
    authActionBtn.onclick = () => {
        const name = authNameInput.value.trim(), pass = authPasswordInput.value;
        if (!name || !pass) { authError.textContent = '❌ Заполните все поля'; return; }
        isAuthMode === 'login' ? loginUser(name, pass) : registerUser(name, pass);
    };
    authSwitchBtn.onclick = () => {
        isAuthMode = isAuthMode === 'login' ? 'register' : 'login';
        authTitle.textContent = isAuthMode === 'login' ? '🐍 ВХОД' : '🐍 РЕГИСТРАЦИЯ';
        authActionBtn.textContent = isAuthMode === 'login' ? 'ВОЙТИ' : 'ЗАРЕГИСТРИРОВАТЬСЯ';
        authSwitchBtn.textContent = isAuthMode === 'login' ? 'НЕТ АККАУНТА? СОЗДАТЬ' : 'ЕСТЬ АККАУНТ? ВОЙТИ';
        authError.textContent = '';
    };
    
    document.getElementById('confirmPasswordBtn').onclick = () => {
        if (Date.now() < lockUntil) return;
        if (adminPasswordInput.value === ADMIN_PASSWORD) {
            isAdmin = true; passwordAttempts = 0;
            passwordModal.style.display = 'none';
            settingsModal.style.display = 'flex';
            renderSettings();
        } else {
            passwordAttempts++;
            passwordError.textContent = `❌ Неверный пароль (${passwordAttempts}/3)`;
            if (passwordAttempts >= 3) { lockUntil = Date.now() + 30000; passwordError.textContent = '⏳ Заблокировано на 30 сек'; document.getElementById('confirmPasswordBtn').disabled = true; }
        }
    };
    document.getElementById('cancelPasswordBtn').onclick = () => { passwordModal.style.display = 'none'; settingsModal.style.display = 'flex'; };
    adminPasswordInput.onkeypress = e => { if (e.key === 'Enter') document.getElementById('confirmPasswordBtn').click(); };
    
    document.querySelectorAll('.ctrl[data-dir]').forEach(btn => {
        btn.onclick = () => setDirection(btn.dataset.dir);
        btn.ontouchstart = e => { e.preventDefault(); setDirection(btn.dataset.dir); };
    });
    
    pauseButton.onclick = togglePause;
    restartBtn.onclick = restartGame;
    settingsBtn.onclick = () => {
        secretThemeClicks++;
        if (secretThemeClicks >= 10 && currentUser && !currentUser.achievements.secretTheme) {
            currentUser.achievements.secretTheme = true;
            saveCloudData();
            showAchievement('ТАЙНАЯ ТЕМА', '🔮');
            setTimeout(() => alert('🎉 Открыта ЗАГАДОЧНАЯ тема!'), 100);
        }
        if (gameActive && !isPaused) togglePause();
        renderSettings();
        settingsModal.style.display = 'flex';
    };
    logoutBtn.onclick = logout;
    
    window.onkeydown = e => {
        const key = e.key.toLowerCase();
        if (key === 'arrowup' || key === 'w') { e.preventDefault(); setDirection('up'); }
        else if (key === 'arrowdown' || key === 's') { e.preventDefault(); setDirection('down'); }
        else if (key === 'arrowleft' || key === 'a') { e.preventDefault(); setDirection('left'); }
        else if (key === 'arrowright' || key === 'd') { e.preventDefault(); setDirection('right'); }
        else if (key === ' ' || key === 'space') { e.preventDefault(); togglePause(); }
    };
    
    canvas.ontouchstart = e => e.preventDefault();
    canvas.oncontextmenu = e => e.preventDefault();
    
    init();
    draw();
})();
</script>
</body>
</html>
