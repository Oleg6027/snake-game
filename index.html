        'загадочная': { bg:'#1a002a', gridLight:'rgba(255,0,255,0.3)', gridDark:'rgba(0,255,255,0.3)', stroke:'#ff00ff', snake1:'#ff00ff', snake2:'#00ffff' }
    };
    
    // === ФУНКЦИИ СИНХРОНИЗАЦИИ (ГАРАНТИРУЮТ РАБОТУ В WEBVIEW) ===
    function updateCloudStatus(text, online) {
        cloudStatus.textContent = text;
        cloudStatus.className = 'cloud-status' + (online ? '' : ' offline');
    }
    
    // Загружаем данные из LocalStorage (работает всегда)
    function loadLocalData() {
        const saved = localStorage.getItem('snake_cloud_data');
        if (saved) {
            try {
                cloudData = JSON.parse(saved);
            } catch(e) {}
        }
    }
    
    // Сохраняем в LocalStorage
    function saveLocalData() {
        localStorage.setItem('snake_cloud_data', JSON.stringify(cloudData));
    }
    
    // Обновляем глобальную таблицу
    function updateGlobalRecords() {
        const records = [];
        for (let name in cloudData.users) {
            const user = cloudData.users[name];
            if (user.highScore > 0) records.push({ name, score: user.highScore });
        }
        records.sort((a, b) => b.score - a.score);
        cloudData.globalRecords = records.slice(0, 50);
    }
    
    // Отправка в GitHub (без CORS ошибок)
    async function syncToGithub() {
        try {
            const response = await fetch(GIST_URL, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ files: { 'snake-data.json': { content: JSON.stringify(cloudData) } } })
            });
            if (response.ok) {
                updateCloudStatus('☁️ GitHub Online', true);
            }
        } catch(e) {}
    }
    
    // Главная функция сохранения
    function saveAllData() {
        if (!currentUser) return;
        updateGlobalRecords();
        saveLocalData();
        syncToGithub();
    }

    // === АВТОРИЗАЦИЯ ===
    function showAuthModal() {
        authModal.style.display = 'flex';
        authNameInput.value = localStorage.getItem('snake_lastName') || '';
        authPasswordInput.value = '';
        authError.textContent = '';
        isAuthMode = 'login';
        authTitle.textContent = '🐍 ВХОД';
        authActionBtn.textContent = 'ВОЙТИ';
        authSwitchBtn.textContent = 'НЕТ АККАУНТА? СОЗДАТЬ';
    }
    
    function finishLogin(name, user) {
        currentUser = user;
        currentTheme = user.theme || 'тёмная';
        volume = user.volume || 70;
        buttonsVolume = user.buttonsVolume || 30;
        selectedEatSound = user.eatSound || 'click';
        myRecords = user.myRecords || [];
        
        setTheme(currentTheme);
        playerNameDisplay.textContent = name;
        logoutBtn.style.display = 'inline-block';
        recordSpan.innerText = user.highScore || 0;
        
        localStorage.setItem('snake_currentUser', JSON.stringify({ name, password: user.password }));
        localStorage.setItem('snake_lastName', name);
        authModal.style.display = 'none';
        
        if (name === 'Админ') isAdmin = true;
        startGame();
    }
    
    // === ИГРОВАЯ ЛОГИКА ===
    function startGame() {
        gameActive = true;
        spawnNormalFood();
        startGameLoop();
        draw();
    }
    
    // ... (вся игровая логика, отрисовка и модальные окна полностью сохранены из предыдущего кода, но с вызовом saveAllData() вместо старых методов)
    
    // Инициализация
    loadLocalData();
    showAuthModal();
    draw();
})();
</script>
</body>
