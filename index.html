<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🐍 Змейка · МУЛЬТИПЛЕЕР</title>
    <style>
        * { user-select: none; touch-action: manipulation; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; }
        body { background: radial-gradient(circle at 30% 20%, #2d6a4f, #1b4332); display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', Arial, sans-serif; padding: 12px; transition: background 0.3s ease; }
        body.theme-тёмная { background: radial-gradient(circle at 30% 20%, #1a1a2e, #0f0f1a); }
        body.theme-светлая { background: radial-gradient(circle at 30% 20%, #e0e0e0, #b0b0b0); }
        body.theme-лесная { background: radial-gradient(circle at 30% 20%, #1e3a2e, #0f2a1a); }
        body.theme-космос { background: radial-gradient(circle at 30% 20%, #0a0a2a, #000010); }
        body.theme-океан { background: radial-gradient(circle at 30% 20%, #0a3a5a, #002a3a); }
        body.theme-пустыня { background: radial-gradient(circle at 30% 20%, #c9a53b, #8a5a1a); }
        body.theme-неон { background: radial-gradient(circle at 30% 20%, #0a0a0a, #1a004a); }
        body.theme-ночь { background: radial-gradient(circle at 30% 20%, #0a0a1a, #000000); }
        body.theme-бумага { background: radial-gradient(circle at 30% 20%, #f0e6c8, #d4c4a0); }
        body.theme-огонь { background: radial-gradient(circle at 30% 20%, #4a1a0a, #2a0a00); }
        body.theme-чб { background: radial-gradient(circle at 30% 20%, #3a3a3a, #1a1a1a); }
        body.theme-розовая { background: radial-gradient(circle at 30% 20%, #f0a0c0, #d06a8a); }
        body.theme-панк { background: radial-gradient(circle at 30% 20%, #ff00ff, #aa00aa); }
        body.theme-мятная { background: radial-gradient(circle at 30% 20%, #a0ffd0, #60d0a0); }
        body.theme-лавандовая { background: radial-gradient(circle at 30% 20%, #c0a0ff, #9060dd); }
        body.theme-закат { background: radial-gradient(circle at 30% 20%, #ff8844, #aa3311); }
        body.theme-загадочная { 
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff, #ffff00, #ff00ff);
            background-size: 400% 400%;
            animation: mysticBg 3s ease infinite;
        }
        @keyframes mysticBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body.theme-загадочная .game-container {
            animation: mysticSpin 5s linear infinite;
            box-shadow: 0 0 50px #ff00ff, 0 0 100px #00ffff, 0 20px 30px rgba(0,0,0,0.5);
        }
        @keyframes mysticSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        body.theme-загадочная canvas {
            box-shadow: 0 0 0 3px #ff00ff, 0 0 0 6px #00ffff, 0 0 30px #ffff00 !important;
            animation: mysticPulse 1s ease infinite alternate;
        }
        @keyframes mysticPulse {
            0% { filter: hue-rotate(0deg) brightness(1); }
            100% { filter: hue-rotate(360deg) brightness(1.5); }
        }

        .game-container { position: relative; background: rgba(0,0,0,0.4); border-radius: 48px; padding: 16px; box-shadow: 0 20px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; transition: all 0.3s; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #000000aa; backdrop-filter: blur(12px); padding: 10px 20px; border-radius: 60px; margin-bottom: 16px; }
        .stats { font-weight: bold; color: #f9f3c1; font-size: 20px; display: flex; gap: 20px; }
        .score-box, .record-box { background: #1a1a1aaa; padding: 4px 16px; border-radius: 40px; }
        .settings-btn { background: #3a3a3a; border: none; width: 44px; height: 44px; border-radius: 30px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #1a1a1a; transition: 0.04s linear; color: #fff; }
        .settings-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #1a1a1a; }
        canvas { display: block; margin: 0 auto; border-radius: 28px; box-shadow: 0 0 0 3px #ffda88, 0 0 0 6px #2d2418; width: 100%; height: auto; aspect-ratio: 1 / 1; transition: background 0.3s; }
        .dpad { display: flex; flex-direction: column; align-items: center; margin-top: 20px; gap: 10px; }
        .row-up, .row-down { display: flex; justify-content: center; }
        .row-middle { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .ctrl { background: #3a3a3a; border: none; width: 70px; height: 70px; border-radius: 24px; box-shadow: 0 6px 0 #1a1a1a; transition: 0.04s linear; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .ctrl:active { transform: translateY(4px); box-shadow: 0 2px 0 #1a1a1a; }
        .arrow { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 26px solid #fff; }
        .arrow.down { border-bottom: none; border-top: 26px solid #fff; }
        .arrow.left { border-left: none; border-right: 26px solid #fff; border-top: 15px solid transparent; border-bottom: 15px solid transparent; }
        .arrow.right { border-right: none; border-left: 26px solid #fff; border-top: 15px solid transparent; border-bottom: 15px solid transparent; }
        .pause-btn { background: #1a1a1a; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 0 #0a0a0a; }
        .pause-sprite { width: 24px; height: 24px; background: #fff; }
        .pause-sprite.pause { clip-path: polygon(0% 0%, 40% 0%, 40% 100%, 0% 100%, 0% 0%, 60% 0%, 60% 100%, 100% 100%, 100% 0%, 60% 0%); }
        .pause-sprite.play { clip-path: polygon(0% 0%, 100% 50%, 0% 100%); }

        .modal { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); border-radius: 48px; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 30; }
        .modal-content { background: #2a2a2a; border-radius: 48px; padding: 20px; width: 320px; max-width: 90%; text-align: center; max-height: 80vh; overflow-y: auto; }
        .modal-content h3 { color: #ffd966; margin: 0 0 16px; font-size: 22px; }
        .modal-content button { background: #ff6b6b; border: none; padding: 10px 20px; border-radius: 40px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin: 6px; box-shadow: 0 4px 0 #8b3a3a; }
        .modal-content button:active { transform: translateY(2px); box-shadow: 0 1px 0 #8b3a3a; }
        .modal-content button.green { background: #4caf50; box-shadow: 0 4px 0 #2e7d32; }
        .modal-content button.danger { background: #f44336; box-shadow: 0 4px 0 #b71c1c; }
        .setting-item { margin-bottom: 16px; text-align: left; }
        .setting-item label { display: block; color: white; margin-bottom: 6px; font-size: 14px; }
        input[type="range"] { width: 100%; height: 6px; -webkit-appearance: none; background: #ffb347; border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #ffd966; border-radius: 50%; cursor: pointer; }
        select { width: 100%; padding: 8px; border-radius: 30px; background: #3a3a3a; color: white; border: none; margin: 4px 0; }
        .theme-option { display: inline-block; margin: 4px; padding: 6px 12px; background: #3a3a3a; border-radius: 30px; cursor: pointer; font-size: 12px; color: white; }
        .theme-option.selected { background: #ffb347; color: #1e2a1a; }
        .record-item { display: flex; justify-content: space-between; align-items: center; background: #3a3a3a; margin: 6px 0; padding: 6px 12px; border-radius: 30px; color: white; }
        .record-item.my-record { background: #2e7d32 !important; border: 2px solid #4caf50; }
        .achievement-item { display: flex; justify-content: flex-start; gap: 12px; align-items: center; background: #3a3a3a; margin: 6px 0; padding: 6px 12px; border-radius: 30px; color: white; }
        .record-item button { background: none; border: none; color: #ff6b6b; font-size: 18px; cursor: pointer; margin: 0; padding: 0 8px; box-shadow: none; }
        .achievement-icon-small { font-size: 24px; }
        .achievement-info { flex: 1; text-align: left; }
        .achievement-name { color: #ffd966; font-size: 14px; font-weight: bold; }
        .achievement-locked { opacity: 0.5; }
        .achievement-locked .achievement-name { color: #aaa; }
        
        .achievement-toast { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%) translateY(0); 
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a); 
            border-left: 8px solid #ffd966; 
            border-radius: 16px; 
            padding: 10px 20px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            z-index: 100; 
            transition: transform 0.3s ease, opacity 0.3s ease; 
            min-width: 180px;
            opacity: 1;
            pointer-events: none;
        }
        .achievement-toast.hide-toast {
            transform: translateX(-50%) translateY(150px);
            opacity: 0;
        }
        .achievement-icon { font-size: 28px; }
        .achievement-text h4 { margin: 0; color: #ffd966; font-size: 11px; }
        .achievement-text p { margin: 0; color: white; font-size: 13px; font-weight: bold; }

        .cloud-status { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: #0f0; padding: 4px 10px; border-radius: 20px; font-size: 12px; z-index: 300; }
        .cloud-status.offline { color: #f00; }
        .player-name-display { color: #ffd966; margin-left: 10px; font-size: 14px; }
        .logout-btn { background: #607d8b; border: none; padding: 4px 12px; border-radius: 20px; color: white; font-size: 12px; cursor: pointer; margin-left: 8px; }
        .auth-modal { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); border-radius: 48px; display: flex; justify-content: center; align-items: center; z-index: 200; }
        .auth-box { background: #2a2a2a; border-radius: 48px; padding: 30px; width: 340px; max-width: 90%; text-align: center; }
        .auth-box h3 { color: #ffd966; margin-bottom: 20px; }
        .auth-box input { width: 100%; padding: 12px 16px; border-radius: 40px; border: none; background: #3a3a3a; color: white; font-size: 16px; margin-bottom: 12px; outline: none; }
        .auth-box .error-message { color: #ff6b6b; font-size: 12px; margin-bottom: 10px; min-height: 18px; }
        .auth-box button { background: #4caf50; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #2e7d32; width: 100%; margin-bottom: 10px; }
        .auth-box button:active { transform: translateY(2px); box-shadow: 0 2px 0 #2e7d32; }
        .auth-box button.secondary { background: #607d8b; box-shadow: 0 4px 0 #455a64; }
        
        .admin-panel { margin-top: 15px; padding: 10px; border: 2px solid #f44336; border-radius: 20px; background: rgba(244, 67, 54, 0.1); }
        .admin-panel button { background: #f44336 !important; box-shadow: 0 4px 0 #b71c1c !important; width: 100%; }
        
        .password-modal { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); border-radius: 48px; display: none; justify-content: center; align-items: center; z-index: 250; }
        .password-box { background: #2a2a2a; border-radius: 48px; padding: 30px; width: 300px; max-width: 90%; text-align: center; }
        .password-box h3 { color: #ffd966; margin-bottom: 20px; }
        .password-box input { width: 100%; padding: 12px 16px; border-radius: 40px; border: none; background: #3a3a3a; color: white; font-size: 18px; margin-bottom: 10px; outline: none; text-align: center; letter-spacing: 5px; }
        .password-box .error-message { color: #ff6b6b; font-size: 12px; margin-bottom: 10px; min-height: 18px; }
        .password-box button { background: #4caf50; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #2e7d32; width: 100%; margin-bottom: 8px; }
    </style>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.4.0.js"></script>
</head>
<body>
<div id="cloudStatus" class="cloud-status">☁️ Онлайн (PubNub)</div>

<div id="authModal" class="auth-modal" style="display: flex;">
    <div class="auth-box" onclick="event.stopPropagation()">
        <h3 id="authTitle">🐍 ВХОД</h3>
        <input type="text" id="authNameInput" placeholder="Ваше имя" maxlength="20" autocomplete="off" spellcheck="false" style="pointer-events: auto;">
        <input type="password" id="authPasswordInput" placeholder="Пароль" maxlength="20" autocomplete="off" spellcheck="false" style="pointer-events: auto;">
        <div class="error-message" id="authError"></div>
        <button id="authActionBtn">ВОЙТИ</button>
        <button id="authSwitchBtn" class="secondary">НЕТ АККАУНТА? СОЗДАТЬ</button>
    </div>
</div>

<div id="passwordModal" class="password-modal">
    <div class="password-box">
        <h3>🔐 ВВЕДИТЕ ПАРОЛЬ</h3>
        <input type="password" id="adminPasswordInput" placeholder="••••" maxlength="20" autocomplete="off">
        <div class="error-message" id="passwordError"></div>
        <button id="confirmPasswordBtn">ПОДТВЕРДИТЬ</button>
        <button id="cancelPasswordBtn" class="secondary">ОТМЕНА</button>
    </div>
</div>

<div class="game-container">
    <div class="top-bar">
        <div class="stats">
            <div class="score-box">🍎 <span id="scoreValue">0</span></div>
            <div class="record-box">🏆 <span id="recordValue">0</span></div>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <span class="player-name-display" id="playerNameDisplay"></span>
            <button class="logout-btn" id="logoutBtn" style="display:none;">ВЫЙТИ</button>
            <button class="settings-btn" id="settingsBtn">⚙️</button>
        </div>
    </div>
    <canvas id="gameCanvas" width="550" height="550"></canvas>
    <div class="dpad">
        <div class="row-up"><button class="ctrl" data-dir="up"><span class="arrow"></span></button></div>
        <div class="row-middle"><button class="ctrl" data-dir="left"><span class="arrow left"></span></button><button class="ctrl pause-btn" id="pauseButton"><span id="pauseSprite" class="pause-sprite pause"></span></button><button class="ctrl" data-dir="right"><span class="arrow right"></span></button></div>
        <div class="row-down"><button class="ctrl" data-dir="down"><span class="arrow down"></span></button></div>
    </div>
</div>

<div class="modal" id="settingsModal"><div class="modal-content" id="settingsContent"></div></div>
<div class="modal" id="deathModal"><div class="modal-content"><h3>💀 ИГРА ОКОНЧЕНА</h3><button id="restartBtn">🔄 ВОЗРОДИТЬСЯ</button></div></div>
<div class="modal" id="recordsModal"><div class="modal-content" id="recordsContent"></div></div>
<div class="modal" id="myRecordsModal"><div class="modal-content" id="myRecordsContent"></div></div>
<div class="modal" id="achievementsModal"><div class="modal-content" id="achievementsContent"></div></div>

<div id="achievementToast" class="achievement-toast hide-toast">
    <div class="achievement-icon">🏆</div>
    <div class="achievement-text">
        <h4>ДОСТИЖЕНИЕ</h4>
        <p id="achievementName">---</p>
    </div>
</div>

<script>
(function(){
    "use strict";

    // === АВТОРИЗАЦИЯ ===
    const authModal = document.getElementById('authModal');
    const nameInput = document.getElementById('authNameInput');
    const passInput = document.getElementById('authPasswordInput');
    nameInput.disabled = false; passInput.disabled = false;
    setTimeout(() => nameInput.focus(), 100);
    
    let currentUser = null;
    let users = JSON.parse(localStorage.getItem('snake_users') || '{}');
    let myRecords = [];
    let achievements = {};
    
    function login(name, pass) {
        if (!users[name]) { document.getElementById('authError').textContent = '❌ Пользователь не найден'; return false; }
        if (users[name].password !== pass) { document.getElementById('authError').textContent = '❌ Неверный пароль'; return false; }
        currentUser = name;
        myRecords = users[name].myRecords || [];
        achievements = users[name].achievements || {};
        document.getElementById('playerNameDisplay').textContent = name;
        authModal.style.display = 'none';
        startGame();
        return true;
    }
    
    function register(name, pass) {
        if (name.length < 2) { document.getElementById('authError').textContent = '❌ Имя слишком короткое'; return false; }
        if (pass.length < 3) { document.getElementById('authError').textContent = '❌ Пароль слишком короткий'; return false; }
        if (users[name]) { document.getElementById('authError').textContent = '❌ Имя уже занято'; return false; }
        users[name] = { password: pass, highScore: 0, myRecords: [], achievements: {} };
        localStorage.setItem('snake_users', JSON.stringify(users));
        currentUser = name;
        myRecords = [];
        achievements = {};
        document.getElementById('playerNameDisplay').textContent = name;
        authModal.style.display = 'none';
        startGame();
        return true;
    }
    
    document.getElementById('authActionBtn').onclick = () => {
        const name = nameInput.value.trim();
        const pass = passInput.value;
        if (!name || !pass) { document.getElementById('authError').textContent = '❌ Заполните все поля'; return; }
        const title = document.getElementById('authTitle').textContent;
        title.includes('ВХОД') ? login(name, pass) : register(name, pass);
    };
    
    document.getElementById('authSwitchBtn').onclick = () => {
        const title = document.getElementById('authTitle');
        const btn = document.getElementById('authActionBtn');
        const switchBtn = document.getElementById('authSwitchBtn');
        if (title.textContent.includes('ВХОД')) {
            title.textContent = '🐍 РЕГИСТРАЦИЯ'; btn.textContent = 'ЗАРЕГИСТРИРОВАТЬСЯ'; switchBtn.textContent = 'ЕСТЬ АККАУНТ? ВОЙТИ';
        } else {
            title.textContent = '🐍 ВХОД'; btn.textContent = 'ВОЙТИ'; switchBtn.textContent = 'НЕТ АККАУНТА? СОЗДАТЬ';
        }
    };

    // === ЗВУКИ ===
    let audioCtx = null;
    function playSound(type) {
        if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
        if (type === 'eat') { osc.frequency.setValueAtTime(800, now); osc.start(); osc.stop(now + 0.1); }
        else if (type === 'death') { osc.frequency.setValueAtTime(300, now); osc.start(); osc.stop(now + 0.3); }
        else if (type === 'achievement') { osc.frequency.setValueAtTime(1800, now); osc.start(); osc.stop(now + 0.2); }
        else if (type === 'click') { osc.frequency.setValueAtTime(1200, now); gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now + 0.05); }
    }

    // === ДОСТИЖЕНИЯ ===
    const achievementsList = [
        { id: 'firstDeath', name: 'ПЕРВАЯ КРОВЬ', icon: '💀' },
        { id: '10score', name: 'НОВИЧОК', icon: '🍎' },
        { id: '50score', name: 'ЛЮБИТЕЛЬ', icon: '🍎🍎' },
        { id: '100score', name: 'ПРОФИ', icon: '🍎🍎🍎' },
        { id: '500score', name: 'МАСТЕР', icon: '👑' },
        { id: '1000score', name: 'БОГ ЗМЕЙ', icon: '🐉' }
    ];
    
    function showAchievement(name, icon) {
        const toast = document.getElementById('achievementToast');
        document.getElementById('achievementName').textContent = name;
        toast.querySelector('.achievement-icon').innerHTML = icon;
        toast.classList.remove('hide-toast');
        playSound('achievement');
        setTimeout(() => toast.classList.add('hide-toast'), 3000);
    }
    
    function checkAchievements(score) {
        if (!currentUser) return;
        const checks = [
            { score: 10, id: '10score', name: 'НОВИЧОК', icon: '🍎' },
            { score: 50, id: '50score', name: 'ЛЮБИТЕЛЬ', icon: '🍎🍎' },
            { score: 100, id: '100score', name: 'ПРОФИ', icon: '🍎🍎🍎' },
            { score: 500, id: '500score', name: 'МАСТЕР', icon: '👑' },
            { score: 1000, id: '1000score', name: 'БОГ ЗМЕЙ', icon: '🐉' }
        ];
        checks.forEach(c => {
            if (score >= c.score && !achievements[c.id]) {
                achievements[c.id] = true;
                if (users[currentUser]) users[currentUser].achievements = achievements;
                localStorage.setItem('snake_users', JSON.stringify(users));
                showAchievement(c.name, c.icon);
            }
        });
    }

    // === МУЛЬТИПЛЕЕР ===
    const pubnub = new PubNub({ publishKey: 'pub-c-9889c0e7-6b4f-4bf7-b5c8-839171c2f4b6', subscribeKey: 'sub-c-6a4c2e8e-9f1b-4d5e-8a2c-1f3b5d7e9a1b', uuid: 'player-' + Math.random().toString(36) });
    let globalRecords = [];
    pubnub.subscribe({ channels: ['snake-global'] });
    pubnub.addListener({ message: e => { if (e.message.type === 'records') globalRecords = e.message.data; } });
    
    function saveRecord(score) {
        if (!currentUser || score === 0) return;
        const ex = globalRecords.find(r => r.name === currentUser);
        ex ? ex.score = Math.max(ex.score, score) : globalRecords.push({ name: currentUser, score });
        globalRecords.sort((a,b) => b.score - a.score);
        globalRecords = globalRecords.slice(0, 10);
        pubnub.publish({ channel: 'snake-global', message: { type: 'records', data: globalRecords } });
        
        if (!users[currentUser]) users[currentUser] = { password: '', highScore: 0, myRecords: [] };
        users[currentUser].highScore = Math.max(users[currentUser].highScore || 0, score);
        myRecords.push(score); myRecords.sort((a,b)=>b-a); myRecords = myRecords.slice(0,10);
        users[currentUser].myRecords = myRecords;
        localStorage.setItem('snake_users', JSON.stringify(users));
    }

    // === ИГРА ===
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d'), CELL = canvas.width / 15;
    let snake = [{x:7,y:7}], dir = 'right', nextDir = 'right', food = {x:10,y:10}, score = 0, gameActive = false, isPaused = false, interval = null;
    
    function startGame() { gameActive = true; spawnFood(); interval = setInterval(move, 140); draw(); }
    function spawnFood() { let f=[]; for(let i=0;i<15;i++) for(let j=0;j<15;j++) if(!snake.some(s=>s.x===i&&s.y===j)) f.push({x:i,y:j}); if(f.length) food = f[Math.floor(Math.random()*f.length)]; }
    function move() {
        if(!gameActive||isPaused) return; dir = nextDir;
        let h = {...snake[0]};
        if(dir==='right') h.x++; else if(dir==='left') h.x--; else if(dir==='up') h.y--; else if(dir==='down') h.y++;
        if(h.x<0) h.x=14; if(h.x>=15) h.x=0; if(h.y<0) h.y=14; if(h.y>=15) h.y=0;
        if(snake.some(s=>s.x===h.x&&s.y===h.y)) return gameOver();
        snake.unshift(h);
        if(h.x===food.x && h.y===food.y) { score++; playSound('eat'); document.getElementById('scoreValue').textContent = score; checkAchievements(score); spawnFood(); }
        else snake.pop();
        draw();
    }
    function gameOver() {
        gameActive = false; clearInterval(interval);
        playSound('death');
        if(!achievements.firstDeath) { achievements.firstDeath = true; showAchievement('ПЕРВАЯ КРОВЬ','💀'); }
        saveRecord(score);
        alert(`Счёт: ${score}`);
        restartGame();
    }
    function restartGame() {
        snake = [{x:7,y:7}]; dir = nextDir = 'right'; score = 0; document.getElementById('scoreValue').textContent = '0';
        gameActive = true; spawnFood(); interval = setInterval(move, 140); draw();
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let i=0;i<15;i++) for(let j=0;j<15;j++) { ctx.fillStyle = (i+j)%2===0?'#2a4a3a':'#1a3a2a'; ctx.fillRect(i*CELL,j*CELL,CELL-1,CELL-1); }
        snake.forEach((s,i)=>{ ctx.fillStyle = i===0?'#6f6':'#4c4'; ctx.fillRect(s.x*CELL+2,s.y*CELL+2,CELL-4,CELL-4); });
        ctx.fillStyle='#f44'; ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/3,0,2*Math.PI); ctx.fill();
    }
    
    document.querySelectorAll('[data-dir]').forEach(b=>b.onclick=()=>{ const d=b.dataset.dir; if((dir==='right'&&d!=='left')||(dir==='left'&&d!=='right')||(dir==='up'&&d!=='down')||(dir==='down'&&d!=='up')) nextDir=d; });
    document.getElementById('pauseButton').onclick = () => { isPaused=!isPaused; document.getElementById('pauseSprite').className = isPaused?'pause-sprite play':'pause-sprite pause'; };
    document.getElementById('restartBtn').onclick = restartGame;
    document.getElementById('settingsBtn').onclick = () => {
        const c = document.getElementById('recordsContent'); c.innerHTML = '<h3>🏆 МИРОВЫЕ РЕКОРДЫ</h3>';
        globalRecords.forEach(r => c.innerHTML += `<div class="record-item ${r.name===currentUser?'my-record':''}"><span>${r.name}</span><span>${r.score}</span></div>`);
        c.innerHTML += '<button id="closeRecordsBtn">ЗАКРЫТЬ</button>';
        document.getElementById('recordsModal').style.display = 'flex';
        document.getElementById('closeRecordsBtn').onclick = () => document.getElementById('recordsModal').style.display = 'none';
    };
    window.onkeydown = e => {
        const k = e.key; e.preventDefault();
        if(k==='ArrowUp'||k==='w') nextDir='up'; else if(k==='ArrowDown'||k==='s') nextDir='down';
        else if(k==='ArrowLeft'||k==='a') nextDir='left'; else if(k==='ArrowRight'||k==='d') nextDir='right';
        else if(k===' ') { isPaused=!isPaused; document.getElementById('pauseSprite').className = isPaused?'pause-sprite play':'pause-sprite pause'; }
    };
    draw();
})();
</script>
</body>
</html>
